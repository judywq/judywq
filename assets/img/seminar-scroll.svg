<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 560" preserveAspectRatio="none" fill="none">
  <!--
    Open cylinder / tin-can menu (static illustration).
    Depth from elliptical rims + open lid, not CSS 3D transforms.
  -->
  <defs>
    <linearGradient id="bodyShade" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#dcc9a6"/>
      <stop offset="18%" stop-color="#f3e6cf"/>
      <stop offset="50%" stop-color="#f8efdc"/>
      <stop offset="82%" stop-color="#f3e6cf"/>
      <stop offset="100%" stop-color="#dcc9a6"/>
    </linearGradient>
    <linearGradient id="rim" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6b4a32"/>
      <stop offset="45%" stop-color="#4a3222"/>
      <stop offset="100%" stop-color="#3a271a"/>
    </linearGradient>
    <linearGradient id="lidFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d4b4"/>
      <stop offset="100%" stop-color="#c9ae88"/>
    </linearGradient>
  </defs>

  <!-- Cylinder body (slightly bowed sides) -->
  <path
    d="M52 95
       C44 180 44 300 52 430
       L52 448
       L208 448
       L208 430
       C216 300 216 180 208 95
       Z"
    fill="url(#bodyShade)"
    stroke="#3a271a"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Top opening (look into the can) -->
  <ellipse
    cx="130"
    cy="95"
    rx="86"
    ry="28"
    fill="url(#rim)"
    stroke="#3a271a"
    stroke-width="4"
  />
  <!-- Inner lip highlight -->
  <ellipse
    cx="130"
    cy="98"
    rx="68"
    ry="16"
    fill="#2a1c14"
    opacity="0.55"
  />

  <!-- Open lid (hinged top-left, tilted up) -->
  <g transform="translate(48, 18) rotate(-18)">
    <ellipse
      cx="0"
      cy="0"
      rx="34"
      ry="30"
      fill="url(#lidFace)"
      stroke="#3a271a"
      stroke-width="4"
    />
    <!-- underside ring -->
    <ellipse
      cx="0"
      cy="4"
      rx="22"
      ry="18"
      fill="none"
      stroke="#3a271a"
      stroke-width="2.5"
      opacity="0.45"
    />
  </g>
  <!-- Hinge stub -->
  <path
    d="M54 78 C48 70 46 58 50 48"
    stroke="#3a271a"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Bottom elliptical base (thick rim) -->
  <ellipse
    cx="130"
    cy="458"
    rx="92"
    ry="30"
    fill="url(#rim)"
    stroke="#3a271a"
    stroke-width="4"
  />
  <!-- Base top edge (where body meets rim) -->
  <path
    d="M52 448 C90 432 170 432 208 448"
    stroke="#3a271a"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
    opacity="0.7"
  />
  <!-- Soft underside curve on base -->
  <path
    d="M55 470 C95 486 165 486 205 470"
    stroke="#2a1c14"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.35"
  />
</svg>
